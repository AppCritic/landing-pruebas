<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página Simple</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Bienvenido</h1>
    <p>Esta es una página simple con un título, un párrafo de texto y un botón. Versión 2, con CSS separados</p>
    <form id="subscribeForm">
      <input type="email" id="emailInput" placeholder="Introduce tu email" required />
      <button type="submit">Suscribirme</button>
    </form>
    <p id="thanksMessage">Gracias, te hemos registrado.</p>
  </div>
  <script>
    document.getElementById('subscribeForm').addEventListener('submit', function(event) {
      event.preventDefault();
      document.getElementById('thanksMessage').style.display = 'block';
    });
  </script>
</body>
</html>
